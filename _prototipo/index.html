<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlPresta — con inputs simples en pago</title>
    <style>
        :root {
            --green: #075E54;
            --green-dark: #054640;
            --accent: #0E8C4F;
            --accent-dark: #0A6E3D;
            --beige: #ECE5DD;
            --white: #FFFFFF;
            --text: #111B21;
            --muted: #8696a0;
            --line: #E9E3DA;
            --line-soft: #F0EBE3;
            --red: #D9534F;
            --avatar: #D7E7DE;
            --shadow: 0 8px 30px rgba(11, 20, 26, .12);
            --font: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        html,
        body {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: var(--font);
            background: #0e1a1c;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: #0e1a1c;
            border-bottom: 1px solid #1c2c2f;
        }
        .toolbar .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            color: #cfe9df;
            font-weight: 600;
            font-size: 14px;
        }
        .toolbar .brand .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
        }
        .toolbar .brand small {
            color: #6f8a84;
            font-weight: 500;
        }
        .switch {
            display: flex;
            background: #16262a;
            border-radius: 999px;
            padding: 4px;
        }
        .switch button {
            border: 0;
            background: transparent;
            color: #8aa6a0;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 999px;
            cursor: pointer;
            transition: .18s;
        }
        .switch button.active {
            background: var(--accent);
            color: #fff;
        }

        .stage {
            display: flex;
            justify-content: center;
            padding: 34px 16px 60px;
        }

        .desk {
            width: 100%;
            max-width: 1080px;
            height: 720px;
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            box-shadow: var(--shadow);
        }
        .desk-side {
            width: 248px;
            flex-shrink: 0;
            background: var(--green);
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .side-head {
            padding: 22px 20px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 11px;
            background: rgba(255, 255, 255, .14);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 20px;
        }
        .side-head b {
            font-size: 16px;
            display: block;
            line-height: 1.1;
        }
        .side-head span {
            font-size: 11px;
            color: #aecdc4;
        }
        .desk-nav {
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }
        .desk-nav a {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 13px 15px;
            border-radius: 10px;
            color: #dceae5;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .15s;
        }
        .desk-nav a svg {
            width: 20px;
            height: 20px;
            opacity: .85;
        }
        .desk-nav a:hover {
            background: rgba(255, 255, 255, .07);
        }
        .desk-nav a.active {
            background: rgba(255, 255, 255, .16);
            color: #fff;
        }
        .side-foot {
            padding: 16px 18px;
            border-top: 1px solid rgba(255, 255, 255, .1);
            display: flex;
            align-items: center;
            gap: 11px;
        }
        .side-foot .avd {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .16);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }
        .side-foot b {
            font-size: 13px;
            display: block;
        }
        .side-foot span {
            font-size: 11px;
            color: #aecdc4;
            cursor: pointer;
        }
        .side-foot span:hover {
            text-decoration: underline;
        }
        .desk-main {
            flex: 1;
            background: var(--beige);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .desk-topbar {
            height: 58px;
            flex-shrink: 0;
            background: var(--white);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 26px;
            font-size: 17px;
            font-weight: 700;
        }
        .desk-topbar .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .desk-topbar .btn-inactivos {
            border: 0;
            background: #4a6a64;
            color: #fff;
            font-family: var(--font);
            font-weight: 700;
            font-size: 13px;
            padding: 9px 15px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .desk-topbar .btn-inactivos svg {
            width: 16px;
            height: 16px;
        }
        .desk-content {
            flex: 1;
            overflow: auto;
            min-height: 0;
        }
        .twopane {
            display: flex;
            height: 100%;
            min-height: 0;
        }
        .twopane .list-pane {
            width: 336px;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
            background: var(--white);
            overflow: auto;
            display: flex;
            flex-direction: column;
        }
        .twopane .detail-pane {
            flex: 1;
            overflow: auto;
            background: var(--beige);
            min-width: 0;
        }
        .empty-detail {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 10px;
            text-align: center;
            padding: 30px;
            font-size: 14px;
        }
        .empty-detail svg {
            width: 64px;
            height: 64px;
            opacity: .3;
        }

        .phone {
            width: 384px;
            height: 800px;
            background: #0e1a1c;
            border-radius: 44px;
            padding: 12px;
            box-shadow: var(--shadow);
            position: relative;
        }
        .phone .screen {
            width: 100%;
            height: 100%;
            background: var(--beige);
            border-radius: 33px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .phone .notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 24px;
            background: #0e1a1c;
            border-radius: 0 0 16px 16px;
            z-index: 30;
        }
        .m-topbar {
            background: var(--green);
            color: #fff;
            padding: 30px 18px 14px;
            display: flex;
            align-items: center;
            gap: 13px;
            flex-shrink: 0;
        }
        .m-topbar .ttl {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            line-height: 1.15;
        }
        .m-topbar .ttl small {
            display: block;
            font-size: 11.5px;
            font-weight: 400;
            color: #bfe0d6;
            margin-top: 1px;
        }
        .m-topbar .ic {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .m-topbar .top-actions {
            display: flex;
            gap: 8px;
        }
        .m-topbar .top-actions button {
            background: rgba(255, 255, 255, .15);
            border: 0;
            color: #fff;
            border-radius: 8px;
            padding: 6px 12px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .m-topbar .top-actions button svg {
            width: 16px;
            height: 16px;
        }
        .m-body {
            flex: 1;
            overflow: auto;
        }
        .m-tabs {
            flex-shrink: 0;
            background: var(--white);
            border-top: 1px solid var(--line);
            display: flex;
            padding: 8px 8px 12px;
        }
        .m-tabs button {
            flex: 1;
            border: 0;
            background: transparent;
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 0;
            color: var(--muted);
            font-size: 11.5px;
            font-weight: 600;
            cursor: pointer;
        }
        .m-tabs button svg {
            width: 23px;
            height: 23px;
        }
        .m-tabs button.active {
            color: var(--green);
        }

        .pad {
            padding: 18px;
        }
        .pad-lg {
            padding: 26px 30px;
        }
        .av {
            border-radius: 50%;
            background: var(--avatar);
            color: var(--green-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .big-av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cards {
            display: grid;
            gap: 14px;
        }
        .cards.three {
            grid-template-columns: repeat(3, 1fr);
        }
        .cards.stack {
            grid-template-columns: 1fr;
        }
        .stat {
            background: var(--white);
            border-radius: 14px;
            padding: 18px 20px;
            border: 1px solid var(--line-soft);
            cursor: pointer;
            transition: .13s;
        }
        .stat:hover {
            border-color: var(--line);
            box-shadow: 0 3px 12px rgba(11, 20, 26, .06);
        }
        .stat .lab {
            font-size: 12.5px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 9px;
        }
        .stat .val {
            font-size: 27px;
            font-weight: 800;
            letter-spacing: -.5px;
            line-height: 1;
        }
        .stat.warn .val {
            color: var(--red);
        }
        .stat .sub {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 6px;
        }
        .stat .sub.link {
            color: var(--green);
            font-weight: 600;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin: 26px 2px 12px;
        }
        .pay-row {
            background: var(--white);
            border-radius: 12px;
            padding: 13px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 13px;
            border: 1px solid var(--line-soft);
        }
        .pay-row .av {
            width: 40px;
            height: 40px;
            font-size: 14px;
        }
        .pay-row .nm {
            flex: 1;
            min-width: 0;
        }
        .pay-row .nm b {
            font-size: 14.5px;
            display: block;
            font-weight: 600;
        }
        .pay-row .nm span {
            font-size: 12px;
            color: var(--muted);
        }
        .pay-row .mt {
            font-weight: 700;
            font-size: 15px;
            text-align: right;
        }

        .list-head {
            padding: 14px 16px;
            background: var(--white);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--beige);
            border-radius: 999px;
            padding: 11px 15px;
        }
        .search svg {
            width: 17px;
            height: 17px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .search input {
            border: 0;
            background: transparent;
            outline: none;
            font-family: var(--font);
            font-size: 14px;
            width: 100%;
            color: var(--text);
        }
        .chips {
            display: flex;
            gap: 8px;
            margin-top: 11px;
            flex-wrap: wrap;
        }
        .chip {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            font-family: var(--font);
            font-size: 12.5px;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: .13s;
        }
        .chip.on {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }
        .btn-new {
            margin-top: 11px;
            width: 100%;
            border: 0;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-family: var(--font);
            font-size: 14.5px;
            padding: 13px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: .15s;
        }
        .btn-new:hover {
            background: var(--accent-dark);
        }
        .btn-new svg {
            width: 18px;
            height: 18px;
        }

        .list-scroll {
            padding: 14px 16px;
        }
        .client {
            background: var(--white);
            border: 1px solid var(--line-soft);
            border-radius: 13px;
            padding: 13px 14px;
            margin: 0 0 10px;
            display: flex;
            align-items: center;
            gap: 13px;
            cursor: pointer;
            transition: .13s;
        }
        .client:hover {
            border-color: var(--line);
            box-shadow: 0 3px 10px rgba(11, 20, 26, .06);
        }
        .client.sel {
            border-color: var(--green);
            background: #f7fbf9;
        }
        .client .av {
            width: 46px;
            height: 46px;
            font-size: 16px;
        }
        .client .info {
            flex: 1;
            min-width: 0;
        }
        .client .info b {
            font-size: 15px;
            display: block;
            font-weight: 600;
            line-height: 1.2;
        }
        .client .info .debt {
            font-size: 12.5px;
            color: var(--muted);
            margin-top: 2px;
        }
        .client .info .debt strong {
            color: var(--text);
            font-weight: 600;
        }
        .tag {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .tag.ok {
            color: var(--green-dark);
            border: 1px solid #cfe6da;
        }
        .tag.late {
            color: var(--red);
            border: 1px solid #f0cfcd;
        }
        .tag.on-green {
            color: #fff;
            border-color: rgba(255, 255, 255, .5);
        }
        .tag.inactive {
            color: #6f8a84;
            border: 1px solid #d0ddd9;
        }
        .chev {
            width: 19px;
            height: 19px;
            color: #cbd3cf;
            flex-shrink: 0;
        }

        .ficha-hero {
            background: var(--green);
            color: #fff;
            padding: 24px 22px;
        }
        .ficha-hero .top {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ficha-hero .big-av {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .18);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .ficha-hero h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }
        .ficha-hero .meta {
            font-size: 12.5px;
            color: #c7e6dc;
            margin-top: 5px;
        }
        .ficha-body {
            padding: 18px 20px;
        }
        .panel {
            background: var(--white);
            border: 1px solid var(--line-soft);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 13px;
        }
        .panel h3 {
            margin: 0 0 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
        }
        .panel h3 .sub {
            display: block;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 500;
            color: var(--muted);
            font-size: 11.5px;
            margin-top: 4px;
        }
        .kv {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding: 9px 0;
            border-bottom: 1px solid var(--line-soft);
            font-size: 14px;
        }
        .kv:last-child {
            border-bottom: 0;
        }
        .kv .k {
            color: var(--muted);
        }
        .kv .v {
            font-weight: 600;
            text-align: right;
        }
        .kv .v.saldo {
            font-size: 17px;
            font-weight: 800;
        }
        .kv .v.due {
            color: var(--red);
        }
        .kv .v.interes {
            color: var(--accent-dark);
        }

        .panel-multa {
            border: 1px solid #f0cfcd;
            background: #fdf6f6;
        }
        .panel-multa h3 {
            color: var(--red);
        }
        .multa-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #fceaea;
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 12px;
        }
        .multa-banner .l {
            font-size: 12.5px;
            color: #9a3b38;
            font-weight: 600;
        }
        .multa-banner .l b {
            display: block;
            font-size: 13.5px;
            color: var(--red);
        }
        .multa-banner .d {
            font-size: 24px;
            font-weight: 800;
            color: var(--red);
            line-height: 1;
        }
        .multa-day {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f3dede;
            font-size: 13.5px;
        }
        .multa-day:last-child {
            border-bottom: 0;
        }
        .multa-day .dd {
            color: var(--muted);
        }
        .multa-day .dd b {
            color: var(--text);
            font-weight: 600;
            margin-right: 6px;
        }
        .multa-day .dm {
            font-weight: 700;
            color: var(--red);
        }

        .panel-interes-atrasado {
            border: 1px solid #f0d6b0;
            background: #fef9f2;
        }
        .panel-interes-atrasado h3 {
            color: #b47d3a;
        }
        .interes-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f3e8d8;
            font-size: 13.5px;
        }
        .interes-row:last-child {
            border-bottom: 0;
        }
        .interes-row .il {
            color: var(--muted);
        }
        .interes-row .il b {
            color: var(--text);
            font-weight: 600;
            margin-right: 6px;
        }
        .interes-row .im {
            font-weight: 700;
            color: #b47d3a;
        }

        .actions-main {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .actions-main .btn {
            flex: 1;
            min-width: 120px;
        }
        .actions-secondary {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
            border-top: 1px solid var(--line-soft);
            padding-top: 14px;
        }
        .btn {
            border: 0;
            font-family: var(--font);
            font-weight: 700;
            font-size: 13px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: .15s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-dark);
        }
        .btn-primary:disabled {
            background: #e3e8e5;
            color: #a8b3ae;
            cursor: not-allowed;
        }
        .btn-ghost-sm {
            background: var(--white);
            color: var(--green-dark);
            border: 1px solid var(--line);
            padding: 8px 16px;
            font-size: 12.5px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: .15s;
        }
        .btn-ghost-sm:hover {
            background: #f4faf7;
        }
        .btn-danger-sm {
            background: #fff;
            color: var(--red);
            border: 1px solid #f0cfcd;
            padding: 8px 16px;
            font-size: 12.5px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: .15s;
        }
        .btn-danger-sm:hover {
            background: #fdf6f6;
        }
        .btn-danger-sm:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .note-locked {
            font-size: 12px;
            color: var(--muted);
            margin: -4px 2px 14px;
            line-height: 1.4;
        }
        .hist-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 11px 0;

            if (!iso) return 0;

            const t = new Date(); t.setHours(0, 0, 0, 0);

                top = `<div class="ttl">Panel principal<small>Don Prestamista</small></div>`;

            bindPrestamoCalc();

                    const span = document.getElementById('pr-fecha-cobro');

        function bindClienteForm() {
            const t = document.getElementById('cf-has-prestamo');
            if (!t) return;
            const box = document.getElementById('cf-prestamo-box');
            t.addEventListener('change', () => box.classList.toggle('show', t.checked));

            if (ta) ta.addEventListener('change', () => ba.classList.toggle('show', ta.checked));

                document.querySelectorAll('.freq-opt.cf-freq').forEach(x => x.classList.remove('on'));
                o.classList.add('on');
            }));

        function refreshList() {
            const sc = document.querySelector('.list-scroll');
            if (sc) {
                const f = listFiltered();

                ic.innerHTML = f.length ? f.map(c => `
              <div class="inactive-item">

                    `<div style="text-align:center;color:var(--muted);padding:40px 10px;font-size:14px">No hay clientes inactivos</div>`;

        function bindPagoMejoradoCalc() {
            const ab = document.getElementById('pago-abono');
            if (!ab) return;
            const c = clientes[state.clientId];
            const p = c.prestamo;
            const interesActual = interesPeriodo(p);

            function updateTotal() {
                const abono = Math.min(parseNum(ab.value), p.saldo);
                const interesAtr = Math.min(parseNum(document.getElementById('pago-interes-atr-input')?.value || '0'), interesesAtrasados(
                    c));
                const multa = Math.min(parseNum(document.getElementById('pago-multa-input')?.value || '0'), multaAcumulada(p));
                const total = interesActual + interesAtr + multa + abono;

                document.getElementById('cb-int').textContent = fmt(interesActual);
                const cbAtr = document.getElementById('cb-interes-atr');
                if (cbAtr) cbAtr.textContent = fmt(interesAtr);
                const cbMul = document.getElementById('cb-multas');
                if (cbMul) cbMul.textContent = fmt(multa);
                document.getElementById('cb-abono').textContent = fmt(abono);
                document.getElementById('cb-total').textContent = fmt(total);
                document.getElementById('pago-saldo-after').textContent = fmt(Math.max(0, p.saldo - abono));
            }

            ab.addEventListener('input', updateTotal);
            const atrInput = document.getElementById('pago-interes-atr-input');
            if (atrInput) atrInput.addEventListener('input', updateTotal);
            const multaInput = document.getElementById('pago-multa-input');
            if (multaInput) multaInput.addEventListener('input', updateTotal);
            window._updatePagoMejorado = updateTotal;
        }

        function bindPrestamoCalc() {
            const m = document.getElementById('pr-monto');
            if (!m) return;
            let freq = 'mensual';
            const upd = () => {
                const monto = parseNum(m.value),
                    tasa = tasaDe(freq),
                    interes = monto * tasa;
                document.getElementById('pr-tasa').textContent = (tasa * 100) + '%';
                document.getElementById('pr-interes').textContent = fmt(interes);
                document.getElementById('pr-total').textContent = fmt(monto + interes);
            };
            m.addEventListener('input', upd);
            document.querySelectorAll('.freq-opt').forEach(o => o.addEventListener('click', () => {
                document.querySelectorAll('.freq-opt').forEach(x => x.classList.remove('on'));
                o.classList.add('on');
                freq = o.dataset.freq;
                upd();
            }));
            const fechaInput = document.getElementById('pr-primer-cobro');
            if (fechaInput) {
                fechaInput.addEventListener('change', function() {
                    const span = document.getElementById('pr-fecha-cobro');
                    if (span) span.textContent = isoToCR(this.value);
                });
            }
        }

        function bindFormPhotos() {
            document.querySelectorAll('input[type=file][data-photo]').forEach(inp => {
                inp.addEventListener('change', e => {
                    const f = e.target.files && e.target.files[0];
                    if (!f) return;
                    const r = new FileReader();
                    r.onload = () => {
                        const key = inp.dataset.photo;
                        formDraft[key] = r.result;
                        const prev = document.querySelector('[data-prev="' + key + '"]');
                        if (prev) { prev.style.backgroundImage = `url('${r.result}')`;
                            prev.classList.add('has'); }
                    };
                    r.readAsDataURL(f);
                });
            });
        }

        document.addEventListener('click', e => {
            const overlay = e.target.closest('.overlay'),
                stop = e.target.closest('[data-stop]');
            if (overlay && !stop) { closeModal(); return; }
            const el = e.target.closest('[data-act]');
            if (!el) return;
            const act = el.dataset.act;

            if (act === 'login') { state.screen = 'dashboard';
                render(); }
            if (act === 'logout') { state.screen = 'login';
                state.clientId = null;
                render(); }
            if (act === 'nav') {
                state.screen = el.dataset.screen;
                if (state.view === 'mobile' && state.screen === 'clientes') state.clientId = null;
                render();
            }
            if (act === 'filter') {
                state.filter = el.dataset.filter;
                if (state.screen !== 'clientes') { state.screen = 'clientes'; if (state.view === 'mobile') state.clientId =
                    null; }
                render();
            }
            if (act === 'openClient') {
                state.clientId = parseInt(el.dataset.id, 10);
                if (state.view === 'mobile') state.screen = 'ficha';
                render();
            }
            if (act === 'back') { state.screen = 'clientes';
                render(); }
            if (act === 'backInactivos') { state.screen = 'clientes';
                render(); }
            if (act === 'toggleInactivos') {
                if (state.screen === 'inactivos') { state.screen = 'clientes'; } else { state.screen = 'inactivos'; }
                if (state.view === 'mobile') state.clientId = null;
                render();
            }
            if (act === 'openModal') { state.modal = el.dataset.modal;
                render(); }
            if (act === 'closeModal') { closeModal(); }
            if (act === 'savePagoMejorado') { savePagoMejorado(); }
            if (act === 'savePrestamo') { savePrestamo(); }
            if (act === 'saveCliente') { saveCliente(el.dataset.mode); }
            if (act === 'desactivarCliente') { desactivarCliente(); }
            if (act === 'reactivar') { reactivarCliente(parseInt(el.dataset.id, 10)); }
            if (act === 'toast') { toast(el.dataset.msg || 'Acción de ejemplo'); }
        });

        function closeModal() { state.modal = null; const r = document.getElementById('modal-root'); if (r) r.remove(); }

        function savePagoMejorado() {
            const c = clientes[state.clientId];
            const p = c.prestamo;
            const interesActual = interesPeriodo(p);
            const interesAtr = Math.min(parseNum(document.getElementById('pago-interes-atr-input')?.value || '0'), interesesAtrasados(
                c));
            const multa = Math.min(parseNum(document.getElementById('pago-multa-input')?.value || '0'), multaAcumulada(p));
            const abono = Math.min(parseNum(document.getElementById('pago-abono').value), p.saldo);
            const total = interesActual + interesAtr + multa + abono;
            if (total <= 0) { toast('No hay nada que cobrar'); return; }

            const fecha = isoToCR(document.getElementById('pago-fecha').value);
            const metodo = document.getElementById('pago-metodo').value;
            let desc = metodo;
            if (multa > 0) desc += ' (incluye multa)';
            if (interesAtr > 0) desc += ' (incluye intereses atrasados)';

            c.pagos.unshift({ f: fecha, m: total, int: interesActual + interesAtr, cap: abono, met: desc });
            p.saldo = Math.max(0, p.saldo - abono);

            if (interesAtr > 0 && c.interesesAtrasados && c.interesesAtrasados.length > 0) {
                let resto = interesAtr;
                for (let i = c.interesesAtrasados.length - 1; i >= 0 && resto > 0; i--) {
                    const item = c.interesesAtrasados[i];
                    if (item.monto <= resto) {
                        resto -= item.monto;
                        c.interesesAtrasados.splice(i, 1);
                    } else {
                        item.monto -= resto;
                        resto = 0;
                    }
                }
            }

            if (multa > 0 && p.diasAtraso > 0) {
                const porDia = multaPorDia(p.monto);
                const diasPagados = Math.floor(multa / porDia);
                p.diasAtraso = Math.max(0, p.diasAtraso - diasPagados);
                if (p.diasAtraso === 0) {
                    p.vencido = false;
                    p.atrasoDesde = null;
                    c.estado = 'al-dia';
                }
            }

            if (p.saldo === 0) {
                p.terminado = true;
                p.proximo = '—';
                c.estado = 'al-dia';
                p.diasAtraso = 0;
                p.vencido = false;
                p.atrasoDesde = null;
                c.interesesAtrasados = [];
            }

            closeModal();
            render();
            toast(`Pago registrado · total ${fmt(total)} · deuda: ${fmt(p.saldo)}`);
        }

        function savePrestamo() {
            const c = clientes[state.clientId];
            const monto = parseNum(document.getElementById('pr-monto').value);
            const on = document.querySelector('.freq-opt.on'),
                freq = on ? on.dataset.freq : 'mensual';
            const fechaCobro = document.getElementById('pr-primer-cobro').value;
            if (monto <= 0) { toast('Ingresá un monto válido'); return; }
            if (!fechaCobro) { toast('Seleccioná la fecha del primer cobro'); return; }
            const tasa = tasaDe(freq),
                total = monto + monto * tasa;
            const primerCobro = isoToCR(fechaCobro);
            const proximo = calcularProximoPago(freq, primerCobro);
            c.prestamo = {
                monto,
                saldo: total,
                frecuencia: freq,
                tasa,
                proximo: proximo || '—',
                cuota: Math.round(total / (freq === 'semanal' ? 8 : freq === 'quincenal' ? 4 : 2)),
                terminado: false,
                diasAtraso: 0,
                atrasoDesde: null,
                vencido: false,
                primerCobro: primerCobro
            };
            c.estado = 'al-dia';
            c.interesesAtrasados = [];
            closeModal();
            render();
            toast(`Préstamo creado · total ${fmt(total)} · primer cobro ${primerCobro}`);
        }

        function saveCliente(mode) {
            const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
            const nombre = g('cf-nombre'),
                apellidos = g('cf-apellidos');
            if (!nombre || !apellidos) { toast('Escribí al menos nombre y apellidos'); return; }
            const data = {
                nombre,
                apellidos,
                cedula: g('cf-cedula'),
                telefono: g('cf-telefono'),
                direccion: g('cf-direccion'),
                trabajo: g('cf-trabajo'),
                foto: formDraft.foto,
                cedulaFoto: formDraft.cedulaFoto
            };
            if (mode === 'editar') {
                Object.assign(clientes[state.clientId], data);
                closeModal();
                render();
                toast('Cambios guardados');
            } else {
                const id = clientes.length;
                const tienePrestamo = document.getElementById('cf-has-prestamo')?.checked;
                let prestamo = { monto: 0, saldo: 0, frecuencia: 'mensual', tasa: .20, proximo: '—', cuota: 0, terminado: true };
                let estado = 'al-dia';
                let interesesAtr = [];

                if (tienePrestamo) {
                    const monto = parseNum(document.getElementById('cf-pr-monto').value);
                    const saldo = parseNum(document.getElementById('cf-pr-saldo').value) || monto;
                    const freqOn = document.querySelector('.freq-opt.cf-freq.on');
                    const freq = freqOn ? freqOn.dataset.freq : 'mensual';
                    const inicioIso = document.getElementById('cf-pr-inicio').value;
                    const inicioCR = inicioIso ? isoToCR(inicioIso) : '—';
                    const proxIso = document.getElementById('cf-pr-proximo').value;
                    const intPagados = parseNum(document.getElementById('cf-pr-intpag').value);
                    const abonado = Math.max(0, monto - saldo);

                    let diasAtraso = 0, multaManual = 0, vencido = false;
                    let proximo = proxIso ? isoToCR(proxIso) : '—';

                    if (document.getElementById('cf-has-atraso')?.checked) {
                        diasAtraso = parseNum(document.getElementById('cf-pr-dias').value);
                        multaManual = parseNum(document.getElementById('cf-pr-multa').value);
                        const intAtr = parseNum(document.getElementById('cf-pr-intatr').value);
                        if (diasAtraso > 0 || multaManual > 0 || intAtr > 0) { vencido = true; estado = 'atrasado'; }
                        if (intAtr > 0) interesesAtr = [{ f: proximo, monto: intAtr }];
                    }
                    prestamo = {
                        monto, saldo, frecuencia: freq, tasa: tasaDe(freq),
                        proximo, primerCobro: inicioCR, inicio: inicioCR,
                        interesesPagados: intPagados, abonado, cuota: 0,
                        diasAtraso, multaManual, vencido, terminado: false
                    };
                }

                clientes.push({
                    id, ...data, estado, prestamo, pagos: [], interesesAtrasados: interesesAtr
                });
                state.clientId = id;
                state.filter = 'todos';
                state.screen = state.view === 'mobile' ? 'ficha' : 'clientes';
                closeModal();
                render();
                toast(tienePrestamo ? 'Cliente y préstamo registrados' : 'Cliente creado');
            }
        }

        function desactivarCliente() {
            const c = clientes[state.clientId];
            if (c.prestamo.saldo > 0) { toast('No se puede desactivar con deuda pendiente'); return; }
            const inactivo = { ...c, estado: 'inactivo' };
            inactivos.push(inactivo);
            clientes.splice(state.clientId, 1);
            clientes.forEach((cl, i) => cl.id = i);
            state.clientId = null;
            state.screen = 'clientes';
            render();
            toast('Cliente desactivado');
        }

        function reactivarCliente(id) {
            const idx = inactivos.findIndex(c => c.id === id);
            if (idx === -1) { toast('Cliente no encontrado'); return; }
            const c = inactivos[idx];
            c.estado = 'al-dia';
            c.prestamo = { monto: 0, saldo: 0, frecuencia: 'mensual', tasa: .20, proximo: '—', cuota: 0, terminado: true };
            c.interesesAtrasados = [];
            c.pagos = [];
            const newId = clientes.length;
            c.id = newId;
            clientes.push(c);
            inactivos.splice(idx, 1);
            state.clientId = newId;
            state.screen = 'clientes';
            render();
            toast('Cliente reactivado con saldo en ₡0');
        }

        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        document.querySelectorAll('.switch button').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.switch button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            state.view = b.dataset.view;
            if (state.view === 'mobile' && state.screen === 'clientes') state.clientId = null;
            closeModal();
            render();
        }));

        render();
    </script>

</body>
</html>
